# Planetaria Home — screen source of truth.
# Grammar: see examples/cashflow/Home.yaml (same file is the grammar reference for now).

name: PlanetariaHome

types:
  Tone: "'positive' | 'negative' | 'neutral' | 'accent'"
  DeploymentStatus: "'offline' | 'online' | 'error'"
  Environment: "'preview' | 'production'"
  NavItem: "{ label: string; to: string; icon?: unknown; current?: boolean }"
  TeamItem: "{ label: string; to: string; initial: string; current?: boolean }"
  Deployment: >
    { id: string; href: string; teamName: string; projectName: string;
      status: DeploymentStatus; statusText: string; description: string;
      environment: Environment }
  ActivityItem: >
    { id: string; user: { name: string; avatar: string };
      projectName: string; commit: string; branch: string;
      date: string; datetime: string }

data:
  nav:
    - { label: Projetos,       to: /projects,    icon: FolderIcon }
    - { label: Deploys,        to: /deployments, icon: ServerIcon, current: true }
    - { label: Atividade,      to: /activity,    icon: SignalIcon }
    - { label: Domínios,       to: /domains,     icon: GlobeAltIcon }
    - { label: Uso,            to: /usage,       icon: ChartBarSquareIcon }
    - { label: Configurações,  to: /settings,    icon: Cog6ToothIcon }

  teams:
    - { label: Planetaria,     to: /teams/planetaria,    initial: P }
    - { label: Protocol,       to: /teams/protocol,      initial: P }
    - { label: Tailwind Labs,  to: /teams/tailwind-labs, initial: T }

  user: { name: Tom Cook, avatar: /avatars/tom.jpg }

  deployments:
    - { id: "1", href: /deployments/1, teamName: Planetaria,    projectName: ios-app,           status: offline, statusText: "Iniciado há 1m 32s", description: "Deploys do GitHub", environment: preview }
    - { id: "2", href: /deployments/2, teamName: Planetaria,    projectName: mobile-api,        status: online,  statusText: "Publicado há 3m",    description: "Deploys do GitHub", environment: production }
    - { id: "3", href: /deployments/3, teamName: Tailwind Labs, projectName: tailwindcss.com,   status: offline, statusText: "Publicado há 3h",    description: "Deploys do GitHub", environment: preview }
    - { id: "4", href: /deployments/4, teamName: Protocol,      projectName: api.protocol.chat, status: error,   statusText: "Falhou há 6d",       description: "Deploys do GitHub", environment: preview }

  activityItems:
    - { id: "1", user: { name: Michael Foster, avatar: /avatars/foster.jpg }, projectName: ios-app,    commit: 2d89f0c8, branch: main, date: "há 1h",  datetime: "2026-04-23T11:00" }
    - { id: "2", user: { name: Lindsay Walton, avatar: /avatars/walton.jpg }, projectName: mobile-api, commit: 249df660, branch: main, date: "há 3h",  datetime: "2026-04-23T09:00" }
    - { id: "3", user: { name: Courtney Henry, avatar: /avatars/henry.jpg  }, projectName: ios-app,    commit: "11464223", branch: main, date: "há 12h", datetime: "2026-04-23T00:00" }

  sortOptions:
    - { label: Nome,                value: name }
    - { label: Última atualização,  value: updated }
    - { label: Ambiente,            value: env }

  environmentLabel:
    preview:    Preview
    production: Produção

  environmentTone:
    preview:    neutral
    production: accent

  statusTone:
    offline: neutral
    online:  positive
    error:   negative

root:
  type: SidebarShell
  nav: $nav
  user: $user
  slots:
    brand:
      - { type: Logo, src: /logo.svg, alt: Planetaria, size: lg }
    nav-extra:
      - { type: NavGroup, title: Suas equipes, items: $teams, variant: initials }
    topbar:
      - { type: SearchField, placeholder: Buscar }
  children:

    - type: Page
      slots:
        rail:
          - type: PageSection
            title: Feed de atividade
            actionLabel: Ver tudo
            actionHref: /activity
            children:
              - type: FeedList
                items: $activityItems
                slots:
                  header:
                    scope: item
                    children:
                      - { type: Avatar, src: $item.user.avatar, alt: $item.user.name, size: xs }
                      - { type: Text, weight: semibold, text: $item.user.name }
                      - { type: time, datetime: $item.datetime, text: $item.date }
                  body:
                    scope: item
                    children:
                      - "Push em "
                      - { type: Text, weight: medium, text: $item.projectName }
                      - " ("
                      - { type: code, text: $item.commit }
                      - " em "
                      - { type: Text, weight: medium, text: $item.branch }
                      - ")"
      children:

        - type: PageHeading
          title: Deploys
          slots:
            actions:
              - type: Menu
                slots:
                  trigger:
                    - "Ordenar por "
                    - { type: Icon, src: ChevronUpDownIcon, size: sm, aria-hidden: true }
                children:
                  - type: MenuItem
                    repeat: { source: $sortOptions, as: o, key: $o.value }
                    value: $o.value
                    text: $o.label

        - type: ResourceList
          items: $deployments
          itemHref: href
          slots:
            leading:
              scope: item
              children:
                - { type: StatusDot, tone: ${statusTone[item.status]} }
            title:
              scope: item
              children:
                - { type: Text, text: $item.teamName }
                - { type: Text, tone: muted, text: " / " }
                - { type: Text, text: $item.projectName }
            meta:
              scope: item
              text: "${item.description} · ${item.statusText}"
            trailing:
              scope: item
              children:
                - type: StatusBadge
                  tone:  ${environmentTone[item.environment]}
                  label: ${environmentLabel[item.environment]}
