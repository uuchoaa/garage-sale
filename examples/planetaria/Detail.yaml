# Planetaria Detail (project) — screen source of truth.
# Grammar: see docs/yaml-grammar.md.
#
# No form on this screen → no .schema.ts.

name: PlanetariaDetail

types:
  Tone: "'positive' | 'negative' | 'neutral' | 'accent'"
  NavItem: "{ label: string; to: string; icon?: unknown; current?: boolean }"
  TeamItem: "{ label: string; to: string; initial: string; current?: boolean }"
  NavTab: "{ label: string; value: string; current?: boolean }"
  Environment: "'preview' | 'production'"
  DeployStatus: "'completed' | 'error'"
  Stat: "{ label: string; value: string; delta: string; tone: Tone }"
  Column: "{ key: string; label: string; align?: 'start' | 'end' }"
  Deploy: >
    { id: string; user: { name: string; avatar: string };
      commit: string; branch: string; status: DeployStatus;
      duration: string; date: string; datetime: string }

data:
  nav:
    - { label: Projetos,      to: /projects,    icon: FolderIcon }
    - { label: Deploys,       to: /deployments, icon: ServerIcon, current: true }
    - { label: Atividade,     to: /activity,    icon: SignalIcon }
    - { label: Domínios,      to: /domains,     icon: GlobeAltIcon }
    - { label: Uso,           to: /usage,       icon: ChartBarSquareIcon }
    - { label: Configurações, to: /settings,    icon: Cog6ToothIcon }

  teams:
    - { label: Planetaria,    to: /teams/planetaria,    initial: P }
    - { label: Protocol,      to: /teams/protocol,      initial: P }
    - { label: Tailwind Labs, to: /teams/tailwind-labs, initial: T }

  user: { name: Tom Cook, avatar: /avatars/tom.jpg }

  detailTabs:
    - { label: Visão geral,   value: overview,      current: true }
    - { label: Atividade,     value: activity }
    - { label: Configurações, value: settings }
    - { label: Colaboradores, value: collaborators }
    - { label: Notificações,  value: notifications }

  project:
    team:        Planetaria
    name:        mobile-api
    description: Deploys do GitHub via branch main
    environment: production
    status:      online

  environmentLabel:
    preview:    Preview
    production: Produção

  environmentTone:
    preview:    neutral
    production: accent

  projectTone:
    online:  positive
    offline: neutral
    error:   negative

  stats:
    - { label: Número de deploys,     value: "405",       delta: "", tone: neutral }
    - { label: Tempo médio de deploy, value: "3,65 min",  delta: "", tone: neutral }
    - { label: Número de servidores,  value: "3",         delta: "", tone: neutral }
    - { label: Taxa de sucesso,       value: "98,5%",     delta: "", tone: positive }

  columns:
    - { key: user,     label: Usuário }
    - { key: commit,   label: Commit }
    - { key: status,   label: Status }
    - { key: duration, label: Duração }
    - { key: date,     label: "Publicado em", align: end }

  deploys:
    - { id: "1", user: { name: Michael Foster, avatar: /avatars/foster.jpg }, commit: 2d89f0c8, branch: main, status: completed, duration: "25s",    date: "há 45 minutos", datetime: 2026-04-23T10:15 }
    - { id: "2", user: { name: Lindsay Walton, avatar: /avatars/walton.jpg }, commit: 249df660, branch: main, status: completed, duration: "1m 32s", date: "há 3 horas",    datetime: 2026-04-23T08:00 }
    - { id: "3", user: { name: Courtney Henry, avatar: /avatars/henry.jpg  }, commit: "11464223", branch: main, status: error,  duration: "1m 4s",  date: "há 12 horas",   datetime: 2026-04-22T23:00 }
    - { id: "4", user: { name: Courtney Henry, avatar: /avatars/henry.jpg  }, commit: dad28e95, branch: main, status: completed, duration: "2m 15s", date: "há 2 dias",     datetime: 2026-04-21T12:00 }
    - { id: "5", user: { name: Michael Foster, avatar: /avatars/foster.jpg }, commit: 624bc94c, branch: main, status: completed, duration: "1m 12s", date: "há 5 dias",     datetime: 2026-04-18T11:34 }

  deployStatusTone:
    completed: positive
    error:     negative

  deployStatusLabel:
    completed: Concluído
    error:     Erro

root:
  type: SidebarShell
  nav: $nav
  user: $user
  slots:
    brand:
      - { type: Logo, src: /logo.svg, alt: Planetaria, size: lg }
    nav-extra:
      - { type: NavGroup, title: Suas equipes, items: $teams, variant: initials }
    topbar:
      - { type: SearchField, placeholder: Buscar }
  children:

    - type: Page
      children:

        - type: PageHeading
          title: $project.name
          slots:
            nav:
              - { type: NavTabs, items: $detailTabs }

        - type: DetailHeading
          description: $project.description
          slots:
            leading:
              - { type: StatusDot, tone: ${projectTone[project.status]} }
            title:
              - { type: Text, weight: semibold, text: $project.team }
              - { type: Text, tone: muted, text: " / " }
              - { type: Text, weight: semibold, text: $project.name }
            actions:
              - type: StatusBadge
                tone:  ${environmentTone[project.environment]}
                label: ${environmentLabel[project.environment]}

        - { type: StatGrid, items: $stats }

        - type: ResourceTable
          title: Atividade recente
          columns: $columns
          items: $deploys
          slots:

            user:
              scope: item
              children:
                - type: Cluster
                  gap: sm
                  align: center
                  children:
                    - { type: Avatar, src: $item.user.avatar, alt: $item.user.name, size: sm }
                    - { type: Text, weight: medium, text: $item.user.name }

            commit:
              scope: item
              children:
                - type: Cluster
                  gap: sm
                  align: center
                  children:
                    - { type: code, text: $item.commit }
                    - { type: StatusBadge, tone: neutral, label: $item.branch }

            status:
              scope: item
              children:
                - type: Cluster
                  gap: sm
                  align: center
                  children:
                    - { type: StatusDot, tone: ${deployStatusTone[item.status]} }
                    - { type: Text, text: ${deployStatusLabel[item.status]} }

            duration:
              scope: item
              children:
                - $item.duration

            date:
              scope: item
              children:
                - { type: time, datetime: $item.datetime, text: $item.date }
