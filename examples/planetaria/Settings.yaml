# Planetaria Settings — screen source of truth.
# Grammar: see docs/yaml-grammar.md.
#
# Forms note: YAML describes structure + initial data + error bindings.
# Form wiring (useForm / handleSubmit) lives in the script layer — target-specific.
# Schema lives in ./Settings.schema.ts.

name: PlanetariaSettings

types:
  NavItem: "{ label: string; to: string; icon?: unknown; current?: boolean }"
  TeamItem: "{ label: string; to: string; initial: string; current?: boolean }"
  NavTab: "{ label: string; value: string; current?: boolean }"
  SelectOption: "{ value: string; label: string }"

data:
  nav:
    - { label: Projetos,      to: /projects,    icon: FolderIcon }
    - { label: Deploys,       to: /deployments, icon: ServerIcon }
    - { label: Atividade,     to: /activity,    icon: SignalIcon }
    - { label: Domínios,      to: /domains,     icon: GlobeAltIcon }
    - { label: Uso,           to: /usage,       icon: ChartBarSquareIcon }
    - { label: Configurações, to: /settings,    icon: Cog6ToothIcon, current: true }

  teams:
    - { label: Planetaria,    to: /teams/planetaria,    initial: P }
    - { label: Protocol,      to: /teams/protocol,      initial: P }
    - { label: Tailwind Labs, to: /teams/tailwind-labs, initial: T }

  user: { name: Tom Cook, avatar: /avatars/tom.jpg }

  settingsTabs:
    - { label: Conta,         value: account,       current: true }
    - { label: Notificações,  value: notifications }
    - { label: Faturamento,   value: billing }
    - { label: Equipes,       value: teams }
    - { label: Integrações,   value: integrations }

  timezones:
    - { value: America/Sao_Paulo, label: "São Paulo (BRT)" }
    - { value: America/New_York,  label: "Nova York (EST)" }
    - { value: Europe/London,     label: "Londres (GMT)" }

  personalInitial:
    firstName: Tom
    lastName:  Cook
    email:     tom.cook@planetaria.io
    username:  tomcook
    timezone:  America/Sao_Paulo

root:
  type: SidebarShell
  nav: $nav
  user: $user
  slots:
    brand:
      - { type: Logo, src: /logo.svg, alt: Planetaria, size: lg }
    nav-extra:
      - { type: NavGroup, title: Suas equipes, items: $teams, variant: initials }
    topbar:
      - { type: SearchField, placeholder: Buscar }
  children:

    - type: Page
      children:

        - type: PageHeading
          title: Configurações da conta
          slots:
            nav:
              - { type: NavTabs, items: $settingsTabs }

        - type: SettingsFormSection
          title: Informações pessoais
          description: Use um endereço de e-mail onde você possa receber mensagens.
          submitLabel: Salvar
          schema: personalInfoSchema
          children:
            - type: AvatarField
              src: $user.avatar
              alt: $user.name
              hint: "JPG, GIF ou PNG. Máximo 1 MB."
              actionLabel: Alterar avatar
            - { type: TextField, field: firstName,   label: Nome,              autocomplete: given-name,  required: true }
            - { type: TextField, field: lastName,    label: Sobrenome,         autocomplete: family-name, required: true }
            - { type: TextField, field: email,       label: E-mail,            type: email, autocomplete: email, required: true }
            - type: TextField
              field: username
              label: Nome de usuário
              required: true
              slots:
                prefix:
                  - { type: Text, tone: muted, text: "planetaria.io/" }
            - { type: Select, field: timezone, label: Fuso horário, options: $timezones }

        - type: SettingsFormSection
          title: Alterar senha
          description: Atualize a senha associada à sua conta.
          submitLabel: Salvar
          schema: changePasswordSchema
          children:
            - { type: TextField, field: currentPassword, label: Senha atual,          type: password, autocomplete: current-password, required: true }
            - { type: TextField, field: newPassword,     label: Nova senha,           type: password, autocomplete: new-password,     required: true }
            - { type: TextField, field: confirmPassword, label: Confirmar nova senha, type: password, autocomplete: new-password,     required: true }

        - type: SettingsFormSection
          title: Encerrar outras sessões
          description: Digite sua senha para encerrar outras sessões em todos os seus dispositivos.
          submitLabel: Encerrar sessões
          schema: logoutOthersSchema
          children:
            - { type: TextField, field: password, label: Sua senha, type: password, autocomplete: current-password, required: true }

        - type: SettingsFormSection
          title: Excluir conta
          description: Não deseja mais usar o serviço? Você pode excluir sua conta aqui. Esta ação é irreversível e apaga permanentemente todos os dados associados.
          children:
            - { type: Button, variant: danger, text: "Sim, excluir minha conta" }
