# Planetaria Index (projects) — screen source of truth.
# Grammar: see docs/yaml-grammar.md.

name: PlanetariaIndex

types:
  Tone: "'positive' | 'negative' | 'neutral' | 'accent'"
  NavItem: "{ label: string; to: string; icon?: unknown; current?: boolean }"
  TeamItem: "{ label: string; to: string; initial: string; current?: boolean }"
  EnvironmentTab: "{ label: string; value: string; current?: boolean }"
  Column: "{ key: string; label: string; align?: 'start' | 'end' }"

  Environment: "'preview' | 'production'"
  ProjectStatus: "'online' | 'offline' | 'error'"
  Project: >
    { id: string; name: string; team: string; href: string;
      status: ProjectStatus; environment: Environment;
      lastDeploy: { date: string; datetime: string; by: string } }
  Pagination: >
    { summary: string; hasPrev: boolean; hasNext: boolean }

data:
  nav:
    - { label: Projetos,      to: /projects,    icon: FolderIcon,          current: true }
    - { label: Deploys,       to: /deployments, icon: ServerIcon }
    - { label: Atividade,     to: /activity,    icon: SignalIcon }
    - { label: Domínios,      to: /domains,     icon: GlobeAltIcon }
    - { label: Uso,           to: /usage,       icon: ChartBarSquareIcon }
    - { label: Configurações, to: /settings,    icon: Cog6ToothIcon }

  teams:
    - { label: Planetaria,    to: /teams/planetaria,    initial: P }
    - { label: Protocol,      to: /teams/protocol,      initial: P }
    - { label: Tailwind Labs, to: /teams/tailwind-labs, initial: T }

  user: { name: Tom Cook, avatar: /avatars/tom.jpg }

  environmentTabs:
    - { label: Todos,     value: all,         current: true }
    - { label: Produção,  value: production }
    - { label: Preview,   value: preview }

  columns:
    - { key: project,    label: Projeto }
    - { key: status,     label: Status }
    - { key: environment, label: Ambiente }
    - { key: lastDeploy, label: "Último deploy" }
    - { key: team,       label: Equipe }
    - { key: actions,    label: "",           align: end }

  projects:
    - { id: "1", name: mobile-api,    team: Planetaria,    href: /projects/mobile-api,    status: online,  environment: production, lastDeploy: { date: "há 45 minutos", datetime: 2026-04-23T10:15, by: "Michael Foster"  } }
    - { id: "2", name: web-app,       team: Planetaria,    href: /projects/web-app,       status: online,  environment: production, lastDeploy: { date: "há 3 horas",    datetime: 2026-04-23T08:00, by: "Lindsay Walton"  } }
    - { id: "3", name: docs,          team: Planetaria,    href: /projects/docs,          status: online,  environment: preview,    lastDeploy: { date: "há 1 dia",      datetime: 2026-04-22T12:00, by: "Courtney Henry"  } }
    - { id: "4", name: design-system, team: Tailwind Labs, href: /projects/design-system, status: error,   environment: preview,    lastDeploy: { date: "há 2 dias",     datetime: 2026-04-21T09:00, by: "Tom Cook"        } }
    - { id: "5", name: marketing,     team: Protocol,      href: /projects/marketing,     status: offline, environment: production, lastDeploy: { date: "há 5 dias",     datetime: 2026-04-18T14:00, by: "Whitney Francis" } }

  environmentLabel:
    preview:    Preview
    production: Produção

  environmentTone:
    preview:    neutral
    production: accent

  projectTone:
    online:  positive
    offline: neutral
    error:   negative

  projectStatusLabel:
    online:  Online
    offline: Offline
    error:   Erro

  pagination:
    summary: "1 – 5 de 28"
    hasPrev: false
    hasNext: true

root:
  type: SidebarShell
  nav: $nav
  user: $user
  slots:
    brand:
      - { type: Logo, src: /logo.svg, alt: Planetaria, size: lg }
    nav-extra:
      - { type: NavGroup, title: Suas equipes, items: $teams, variant: initials }
    topbar:
      - { type: SearchField, placeholder: Buscar }
  children:

    - type: Page
      children:

        - type: PageHeading
          title: Projetos
          slots:
            nav:
              - { type: NavTabs, items: $environmentTabs }
            actions:
              - { type: Button, variant: primary, icon: PlusSmallIcon, text: Novo projeto }

        - type: ResourceTable
          columns: $columns
          items: $projects
          slots:

            project:
              scope: item
              children:
                - { type: Link, to: $item.href, text: $item.name }

            status:
              scope: item
              children:
                - type: Cluster
                  gap: sm
                  align: center
                  children:
                    - { type: StatusDot, tone: ${projectTone[item.status]} }
                    - { type: Text, text: ${projectStatusLabel[item.status]} }

            environment:
              scope: item
              children:
                - type: StatusBadge
                  tone:  ${environmentTone[item.environment]}
                  label: ${environmentLabel[item.environment]}

            lastDeploy:
              scope: item
              children:
                - type: Stack
                  gap: xs
                  children:
                    - { type: time, datetime: $item.lastDeploy.datetime, text: $item.lastDeploy.date }
                    - { type: Text, tone: muted, size: xs, text: "por ${item.lastDeploy.by}" }

            team:
              scope: item
              children:
                - { type: Text, text: $item.team }

            actions:
              scope: item
              children:
                - { type: Link, to: $item.href, text: "Ver" }

        - type: Pagination
          summary: $pagination.summary
          hasPrev: $pagination.hasPrev
          hasNext: $pagination.hasNext
